name: Publish Packages

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-github-packages:
    name: Publish GitHub Packages
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    env:
      GITHUB_PACKAGES_USERNAME: ${{ secrets.GH_PACKAGES_USERNAME }}
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - name: Check GitHub Packages secrets
        id: precheck
        shell: bash
        run: |
          if [[ -n "${GITHUB_PACKAGES_USERNAME}" && -n "${GITHUB_PACKAGES_TOKEN}" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Packages publish skipped because GH_PACKAGES_USERNAME or GH_PACKAGES_TOKEN is missing."
          fi

      - name: Checkout
        if: steps.precheck.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Set up Java
        if: steps.precheck.outputs.ready == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: github
          server-username: GITHUB_PACKAGES_USERNAME
          server-password: GITHUB_PACKAGES_TOKEN

      - name: Publish to GitHub Packages
        if: steps.precheck.outputs.ready == 'true'
        run: |
          VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          ARTIFACT_ID="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.artifactId)"
          mvn --batch-mode -P release-github-packages clean package
          mvn --batch-mode -P release-github-packages source:jar javadoc:jar
          mvn --batch-mode -P release-github-packages deploy:deploy-file \
            -DrepositoryId=github \
            -Durl=https://maven.pkg.github.com/ganjb/elfowl \
            -Dfile="target/${ARTIFACT_ID}-${VERSION}.jar" \
            -DpomFile=pom.xml \
            -Dsources="target/${ARTIFACT_ID}-${VERSION}-sources.jar" \
            -Djavadoc="target/${ARTIFACT_ID}-${VERSION}-javadoc.jar"

  publish-maven-central:
    name: Publish Maven Central
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    env:
      MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      - name: Check Maven Central secrets
        id: precheck
        shell: bash
        run: |
          if [[ -n "${MAVEN_USERNAME}" && -n "${MAVEN_PASSWORD}" && -n "${MAVEN_GPG_PASSPHRASE}" && -n "${GPG_PRIVATE_KEY}" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Maven Central publish skipped because required secrets are missing."
          fi

      - name: Checkout
        if: steps.precheck.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Set up Java and GPG
        if: steps.precheck.outputs.ready == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Publish to Maven Central
        if: steps.precheck.outputs.ready == 'true'
        run: mvn --batch-mode -P release-maven-central clean deploy
